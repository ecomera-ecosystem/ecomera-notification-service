<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${subject}">Ecomera</title>
  <style>
    body { margin: 0; padding: 0; background-color: #f4f4f4; font-family: Arial, Helvetica, sans-serif; }
    .container { max-width: 600px; margin: 20px auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header { background: #2563eb; padding: 24px; text-align: center; }
    .header h1 { margin: 0; color: #ffffff; font-size: 24px; }
    .header p { margin: 4px 0 0; color: #bfdbfe; font-size: 14px; }
    .body { padding: 32px 24px; color: #374151; font-size: 16px; line-height: 1.6; }
    .body p { margin: 0 0 16px; }
    .footer { padding: 16px 24px; background: #f9fafb; text-align: center; font-size: 12px; color: #9ca3af; border-top: 1px solid #e5e7eb; }
    .footer p { margin: 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Ecomera</h1>
      <p th:text="${subject}">Notification</p>
    </div>
    <div class="body" th:utext="${bodyContent}">
      Message body
    </div>
    <div class="footer">
      <p>&copy; 2026 Ecomera. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
